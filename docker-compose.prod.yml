services:
  kulto3d-web:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER}
        - NEXT_PUBLIC_INSTAGRAM_HANDLE=${NEXT_PUBLIC_INSTAGRAM_HANDLE}
        - NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY=${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY}
    container_name: kulto3d-web
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - easypanel
    labels:
      - "traefik.enable=true"
      # HTTPS router (both apex and www)
      - "traefik.http.routers.kulto3d.rule=Host(`kulto3d.com`) || Host(`www.kulto3d.com`)"
      - "traefik.http.routers.kulto3d.entrypoints=https"
      - "traefik.http.routers.kulto3d.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kulto3d.tls.domains[0].main=kulto3d.com"
      - "traefik.http.routers.kulto3d.tls.domains[0].sans=www.kulto3d.com"
      - "traefik.http.services.kulto3d.loadbalancer.server.port=3000"
      # HTTP -> HTTPS redirect (both apex and www)
      - "traefik.http.routers.kulto3d-http.rule=Host(`kulto3d.com`) || Host(`www.kulto3d.com`)"
      - "traefik.http.routers.kulto3d-http.entrypoints=http"
      - "traefik.http.routers.kulto3d-http.middlewares=kulto3d-https-redirect"
      - "traefik.http.middlewares.kulto3d-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.kulto3d-https-redirect.redirectscheme.permanent=true"

networks:
  easypanel:
    external: true
